<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Draw Character</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/draw.css">
  </head>
  <body>
    <main class="workspace">
      <header class="page-header">
        <a href="/">Character AI</a>
        <h1>Draw a character</h1>
      </header>
      <section class="canvas-shell">
        <label class="field">
          <span>Mode</span>
          <select id="recognitionMode">
            <option value="all">All characters</option>
            <option value="digits">Digits only</option>
            <option value="uppercase">Uppercase only</option>
            <option value="lowercase">Lowercase only</option>
          </select>
        </label>
        <canvas id="drawingCanvas" width="320" height="320" aria-label="Drawing canvas"></canvas>
        <div class="toolbar">
          <button id="clearCanvas" type="button">Clear</button>
          <button id="predictCanvas" type="button">Predict</button>
        </div>
        <p id="canvasStatus" class="status"></p>
      </section>
    </main>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/canvas.js"></script>
  </body>
</html>
