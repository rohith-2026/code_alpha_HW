<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Character</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/process.css">
  </head>
  <body>
    <main class="workspace">
      <header class="page-header">
        <a href="/">Character AI</a>
        <h1>Upload a character image</h1>
      </header>
      <section class="upload-panel">
        <label class="field">
          <span>Mode</span>
          <select id="recognitionMode">
            <option value="all">All characters</option>
            <option value="digits">Digits only</option>
            <option value="uppercase">Uppercase only</option>
            <option value="lowercase">Lowercase only</option>
          </select>
        </label>
        <input id="imageInput" type="file" accept="image/*">
        <button id="uploadButton" type="button">Predict</button>
        <p id="uploadStatus" class="status"></p>
      </section>
    </main>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/process.js"></script>
  </body>
</html>
